  <text x="28.0" y="180.0" font-family="Roboto Mono, Courier, monospace" font-size="11" fill="#676d71" text-anchor="start" font-weight="400" dominant-baseline="middle">Note: Detokenization happens after each decode step. Each token (T0, T1, T2) is detokenized and output sequentially, not just T3.</text>
</svg>